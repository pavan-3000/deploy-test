name: DevPilot CI
on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Docker Build
        run: |
          if [ -f Dockerfile ]; then
            docker build -t devpilot-app:latest .
          else
            echo "No Dockerfile found, skipping build"
          fi

      - name: Trivy Security Scan
        uses: aquasecurity/trivy-action@v0.12.0
        continue-on-error: true
        with:
          image-ref: devpilot-app:latest
          format: table
          exit-code: "0"

      - name: Push to Registry
        run: |
          echo "${{ secrets.DEVPILOT_REGISTRY_PASS }}" | docker login -u "${{ secrets.DEVPILOT_REGISTRY_USER }}" --password-stdin
          docker tag devpilot-app:latest pav30/deploy-test:${{ github.run_number }}
          docker push pav30/deploy-test:${{ github.run_number }}  # Credentials must be set in GitHub repo Settings → Secrets
      - name: Deploy to VM
        uses: appleboy/ssh-action@v0.1.0
        with:
          host: ${{ secrets.DEVPILOT_DEPLOY_HOST }}
          username: ${{ secrets.DEVPILOT_DEPLOY_USER }}
          key: ${{ secrets.DEVPILOT_DEPLOY_KEY }}
          script: |
            docker pull pav30/deploy-test:${{ github.run_number }}
            docker stop deploy-test || true
            docker rm deploy-test || true
            docker run -d --name deploy-test --restart unless-stopped -p 80:79 pav30/deploy-test:${{ github.run_number }}
      - name: AI Analysis
        continue-on-error: true
        env:
          ANTHROPIC_KEY: ${{ secrets.DEVPILOT_ANTHROPIC_KEY }}
        run: echo "Build complete on branch main"