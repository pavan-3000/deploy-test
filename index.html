<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title> Hello World — DevPilot Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d1117;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #e6edf3;
    }
    .card {
      text-align: center;
      padding: 48px 64px;
      border: 1px solid #30363d;
      border-radius: 12px;
      background: #161b22;
    }
    h1 { font-size: 48px; font-weight: 700; color: #3fb950; margin-bottom: 12px; }
    p  { font-size: 16px; color: #8b949e; }
    .badge {
      display: inline-block;
      margin-top: 24px;
      padding: 6px 14px;
      background: #1f6feb22;
      border: 1px solid #1f6feb66;
      border-radius: 20px;
      font-size: 12px;
      color: #58a6ff;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Hello World</h1>
    <p>Deployed automatically by DevPilot</p>
    <div class="badge">GitHub → fdvfvfv Jenkins → Docker Hub → EC2</div>
  </div>

</html>
